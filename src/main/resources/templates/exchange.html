<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>환율 변환기</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/css/exchange.css" />
  </head>
  <body class="bg-light">
    <div class="container my-5">
      <div class="mb-4">
        <h2 class="fw-bold">최근 기준일 환율</h2>
        <p class="text-muted mb-0">
          한국은행 환율 데이터를 기준으로 통화 변환과 주요 환율을 확인합니다.
        </p>

        <p class="text-muted small mt-2">
          출처: 한국은행 경제통계시스템 ECOS Open API<br />
          ※ 본 환율은 한국은행 ECOS 기준 데이터이며, 실제 은행 환전/송금 환율과
          다를 수 있습니다.
        </p>
      </div>
      </div>
      <!-- 상단 큰 변환 박스 -->
      <section class="converter-card card shadow-sm mb-5">
        <div class="card-body p-4 p-md-5">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <h4 class="fw-bold mb-1">환율 변환기</h4>
              <p class="text-muted mb-0" id="rateInfoText">
                기준일 환율을 불러오는 중입니다.
              </p>
            </div>
          </div>

          <div class="row g-3 align-items-center">
            <!-- 왼쪽 통화 -->
            <div class="col-12 col-lg-5">
              <label for="fromAmount" class="form-label fw-semibold"
                >보유 금액</label
              >

              <div class="currency-box">
                <input
                  type="text"
                  id="fromAmount"
                  class="currency-input"
                  placeholder="예: 100,000"
                  inputmode="numeric"
                  autocomplete="off"
                />

                <select
                  id="fromCurrencySelect"
                  class="currency-select"
                ></select>
              </div>
            </div>

            <!-- 가운데 전환 버튼 -->
            <div class="col-12 col-lg-2 text-center">
              <button
                type="button"
                id="swapCurrencyBtn"
                class="swap-btn"
                aria-label="통화 전환"
              >
                ⇅
              </button>
            </div>

            <!-- 오른쪽 통화 -->
            <div class="col-12 col-lg-5">
              <label for="toAmount" class="form-label fw-semibold"
                >환산 금액</label
              >

              <div class="currency-box">
                <input
                  type="text"
                  id="toAmount"
                  class="currency-input"
                  readonly
                  placeholder="0"
                />

                <select id="toCurrencySelect" class="currency-select"></select>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- 하단 카드 목록 -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold mb-0">주요 통화 환율</h5>
        <p class="text-muted mb-0" id="rateSummary"></p>
      </div>

      <div class="row g-4" id="rateGrid"></div>
    </div>

    <script th:inline="javascript">
      window.__CURRENCY_RATES__ = /*[[${currencyRates}]]*/ [];
      window.__COUNTRY_RATES__ = /*[[${countryRates}]]*/ [];
    </script>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
